<h2 style="margin-bottom: 1rem;">Welcome to TeamFlow</h2>
<p style="color: #666; margin-bottom: 1.5rem;">Sign in to continue.</p>
<!-- (click)="login()" is Angular event binding — when the button is clicked, -->
<!-- call the login() method on our component class -->
<button
  (click)="login()"
  style="
    background: #0d6efd;
    color: white;
    border: none;
    padding: 0.6rem 1.5rem;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    width: 100%;
  "
>
  Login with Auth0
</button>
